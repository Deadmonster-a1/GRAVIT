<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GRAVIT | Digital Studio</title>
    <meta name="description" content="Engineering meets cinema. A world-class digital studio building experiences that refuse to be ignored." />
    
    <!-- Open Graph / Social -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="GRAVIT | Digital Studio" />
    <meta property="og:description" content="Engineering meets cinema. A world-class digital studio building experiences that refuse to be ignored." />

    <meta name="theme-color" content="#0A0A0F" />

  <body>
    <script>
      window.onerror = function(msg, url, line, col, error) {
        document.body.innerHTML = '<div style="color:red;font-size:20px;padding:20px;z-index:999999;position:fixed;top:0;left:0;background:white;width:100%;height:100%;overflow:auto;">' + 
          'Error: ' + msg + '<br>Line: ' + line + '<br>Col: ' + col + '<br><pre>' + (error && error.stack ? error.stack : '') + '</pre>' + 
          '</div>';
      };
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
